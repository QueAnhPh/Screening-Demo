
<h2 class="sr-only">Beacon Fund Deal Screening Assistant — generates a bullet-point investment screening memo</h2>
<style>
.wrap{font-family:var(--font-sans);padding:0;}
.topbar{display:flex;align-items:center;gap:9px;padding-bottom:16px;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:20px;}
.dot{width:9px;height:9px;border-radius:50%;background:#1a6e4a;flex-shrink:0;}
.topbar h1{font-size:15px;font-weight:500;color:var(--color-text-primary);margin:0;}
.pill{margin-left:auto;font-size:11px;color:var(--color-text-secondary);background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);padding:3px 9px;border-radius:var(--border-radius-md);}
.steps{display:flex;margin-bottom:20px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;}
.step{flex:1;text-align:center;font-size:11px;color:var(--color-text-tertiary);padding:8px 4px;background:var(--color-background-secondary);border-right:0.5px solid var(--color-border-tertiary);transition:all .2s;}
.step:last-child{border-right:none;}
.step.on{background:#e9f5f0;color:#1a6e4a;font-weight:500;}
.step i{display:block;font-size:15px;margin-bottom:2px;}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:16px 20px;margin-bottom:12px;}
.slabel{font-size:11px;font-weight:500;color:var(--color-text-tertiary);letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:12px;color:var(--color-text-secondary);font-weight:500;}
input,select,textarea{font-size:13px;}
textarea{width:100%;resize:vertical;min-height:72px;font-family:var(--font-sans);}
.hint{font-size:11px;color:var(--color-text-tertiary);margin-top:3px;line-height:1.5;}
.run{width:100%;padding:10px;font-size:14px;font-weight:500;cursor:pointer;background:#1a6e4a;color:#fff;border:none;border-radius:var(--border-radius-md);display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s;}
.run:hover{opacity:.85;}.run:disabled{opacity:.4;cursor:not-allowed;}
.spin{width:13px;height:13px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.out{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;margin-top:12px;display:none;}
.out-hd{padding:10px 18px;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:space-between;background:var(--color-background-secondary);}
.out-hd span{font-size:12px;font-weight:500;color:var(--color-text-secondary);}
.out-hd div{display:flex;gap:6px;}
.abtn{font-size:11px;cursor:pointer;background:none;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:3px 9px;color:var(--color-text-secondary);font-family:var(--font-sans);}
.abtn:hover{background:var(--color-background-secondary);}
.memo{padding:18px 22px;}
.memo-hd{margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #1a6e4a;}
.memo-hd .co{font-size:16px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px;}
.meta-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:6px;margin-bottom:10px;}
.meta-item{font-size:12px;color:var(--color-text-secondary);}
.meta-item strong{display:block;font-size:11px;color:var(--color-text-tertiary);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-bottom:1px;}
.rec{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:4px 12px;border-radius:var(--border-radius-md);}
.rec.pass{background:#e9f5f0;color:#1a6e4a;}
.rec.monitor{background:#fef9e7;color:#7d6608;}
.rec.decline{background:#fdf2f2;color:#922b21;}
.sec{margin-bottom:14px;}
.sec-title{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-tertiary);margin-bottom:7px;display:flex;align-items:center;gap:6px;}
.sec-title::after{content:'';flex:1;height:0.5px;background:var(--color-border-tertiary);}
ul.bullets{list-style:none;margin:0;padding:0;}
ul.bullets li{display:flex;gap:8px;font-size:13px;line-height:1.6;color:var(--color-text-primary);padding:3px 0;border-bottom:0.5px solid var(--color-border-tertiary);}
ul.bullets li:last-child{border-bottom:none;}
ul.bullets li::before{content:"·";color:#1a6e4a;font-weight:500;flex-shrink:0;font-size:16px;line-height:1.4;}
ul.bullets li strong{color:var(--color-text-primary);}
.errmsg{color:var(--color-text-danger);font-size:13px;padding:14px 20px;}
</style>

<div class="wrap">
  <div class="topbar">
    <div class="dot"></div>
    <h1>Deal Screening Assistant</h1>
    <div class="pill">Beacon Fund · Private Debt</div>
  </div>
  <div class="steps">
    <div class="step on" id="s1"><i class="ti ti-pencil" aria-hidden="true"></i>Input</div>
    <div class="step" id="s2"><i class="ti ti-robot" aria-hidden="true"></i>Analysis</div>
    <div class="step" id="s3"><i class="ti ti-file-text" aria-hidden="true"></i>Memo</div>
    <div class="step" id="s4"><i class="ti ti-send" aria-hidden="true"></i>Pipeline</div>
  </div>
  <div class="card">
    <div class="slabel">Company information</div>
    <div class="frow">
      <div class="fg"><label>Company name *</label><input type="text" id="co" placeholder="e.g. Nguyen Thi Lan Bakery Chain"></div>
      <div class="fg"><label>Sector</label>
        <select id="sec"><option value="">Select</option>
          <option>Food & Beverage</option><option>Healthcare</option><option>Education</option>
          <option>Retail / E-commerce</option><option>Manufacturing</option><option>Agriculture</option>
          <option>Financial Services</option><option>Technology / SaaS</option><option>Logistics</option>
          <option>Beauty & Personal Care</option><option>Other</option>
        </select>
      </div>
    </div>
    <div class="frow">
      <div class="fg"><label>Est. annual revenue (USD)</label>
        <select id="rev"><option value="">Select</option>
          <option>Under $500K</option><option>$500K – $2M</option><option>$2M – $5M</option>
          <option>$5M – $15M</option><option>$15M – $50M</option><option>Over $50M</option>
        </select>
      </div>
      <div class="fg"><label>Leadership</label>
        <select id="lead"><option value="">Select</option>
          <option>Woman-led (founder or CEO)</option><option>Diverse leadership team</option>
          <option>Male-led</option><option>Unknown</option>
        </select>
      </div>
    </div>
    <div class="fg">
      <label>Description & context *</label>
      <textarea id="desc" placeholder="Business model, years in operation, geography, use of proceeds, any known financials..."></textarea>
      <div class="hint">Include: business model · years operating · use of proceeds · revenue visibility</div>
    </div>
  </div>
  <button class="run" id="runBtn" onclick="run()">
    <i class="ti ti-player-play" aria-hidden="true"></i> Generate screening memo
  </button>
  <div class="out" id="outWrap">
    <div class="out-hd">
      <span><i class="ti ti-file-text" aria-hidden="true" style="font-size:13px;margin-right:4px;"></i>Screening memo — <span id="outCo"></span></span>
      <div>
        <button class="abtn" id="cpBtn" onclick="copy()"><i class="ti ti-copy" aria-hidden="true"></i> Copy</button>
        <button class="abtn" onclick="reset()"><i class="ti ti-refresh" aria-hidden="true"></i> New</button>
      </div>
    </div>
    <div class="memo" id="memoBody"></div>
  </div>
</div>

<script>
function setStep(n){['s1','s2','s3','s4'].forEach((id,i)=>document.getElementById(id).classList.toggle('on',i<n));}

function bullets(arr){
  if(!arr||!arr.length) return '';
  return '<ul class="bullets">'+arr.map(item=>{
    const m=item.match(/^\*\*(.+?)\*\*[:–\-]?\s*(.*)/);
    return m?`<li><div><strong>${m[1]}:</strong> ${m[2]}</div></li>`:`<li><div>${item}</div></li>`;
  }).join('')+'</ul>';
}

function proseToBullets(text){
  if(!text) return '';
  const sentences = text.match(/[^.!?]+[.!?]+/g)||[text];
  return '<ul class="bullets">'+sentences.map(s=>s.trim()).filter(Boolean).map(s=>`<li><div>${s}</div></li>`).join('')+'</ul>';
}

function renderMemo(json, company){
  const b = document.getElementById('memoBody');
  const today = new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  const v = json.recommendation_verdict||'';
  const rc = v.includes('PASS')?'pass':v.includes('MONITOR')?'monitor':'decline';

  let html = `<div class="memo-hd">
    <div class="co">${company}</div>
    <div class="meta-grid">
      <div class="meta-item"><strong>Date</strong>${today}</div>
      <div class="meta-item"><strong>Analyst</strong>Pham Que Anh</div>
      <div class="meta-item"><strong>Stage</strong>Initial Screen</div>
      ${json.sector?`<div class="meta-item"><strong>Sector</strong>${json.sector}</div>`:''}
    </div>
    <div class="rec ${rc}"><i class="ti ti-${rc==='pass'?'circle-check':rc==='monitor'?'eye':'x'}" aria-hidden="true"></i>${v}${json.recommendation_rationale?' — '+json.recommendation_rationale:''}</div>
  </div>`;

  const proseSections = [
    ['business_overview','Business overview'],
    ['missing_middle_fit','Missing middle fit'],
    ['gender_impact_lens','Gender & impact lens'],
    ['debt_suitability','Debt suitability'],
  ];
  proseSections.forEach(([k,t])=>{
    if(!json[k]) return;
    html += `<div class="sec"><div class="sec-title">${t}</div>${proseToBullets(json[k])}</div>`;
  });

  const listSections = [
    ['key_risks','Key risks'],
    ['questions_for_next_meeting','Questions for next meeting'],
  ];
  listSections.forEach(([k,t])=>{
    if(!json[k]||!json[k].length) return;
    html += `<div class="sec"><div class="sec-title">${t}</div>${bullets(json[k])}</div>`;
  });

  b.innerHTML = html;
}

async function run(){
  const company = document.getElementById('co').value.trim();
  const desc = document.getElementById('desc').value.trim();
  if(!company||!desc){alert('Please enter a company name and description.');return;}
  const btn = document.getElementById('runBtn');
  btn.disabled=true; btn.innerHTML='<div class="spin"></div> Analysing...';
  setStep(2);
  document.getElementById('outWrap').style.display='none';
  const sector=document.getElementById('sec').value;
  const rev=document.getElementById('rev').value;
  const lead=document.getElementById('lead').value;

  const prompt=`You are a junior investment analyst at Beacon Fund, Vietnam's first private debt fund targeting gender-lens SME lending in Southeast Asia. Beacon's thesis: the "missing middle" — too big for microfinance, too small for PE, wrong for VC, underserved by banks.

Return ONLY valid JSON. No markdown, no preamble, no explanation outside the JSON.

COMPANY: ${company}
SECTOR: ${sector||'Not specified'}
REVENUE: ${rev||'Not specified'}
LEADERSHIP: ${lead||'Not specified'}
CONTEXT: ${desc}

JSON structure (all values plain strings or arrays of strings):
{
  "sector": "short phrase",
  "business_overview": "2-3 crisp sentences covering business model, revenue source, years operating",
  "missing_middle_fit": "2-3 sentences on fit with Beacon thesis",
  "gender_impact_lens": "2-3 sentences on gender leadership and social impact",
  "debt_suitability": "2-3 sentences on cash flow, tenor, use of proceeds",
  "key_risks": ["**Risk label**: one-sentence explanation","**Risk label**: explanation","**Risk label**: explanation"],
  "questions_for_next_meeting": ["**Topic**: specific question for management","**Topic**: question","**Topic**: question"],
  "recommendation_verdict": "PASS TO NEXT STAGE or MONITOR or DECLINE",
  "recommendation_rationale": "one concise sentence"
}`;

  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
    const data=await res.json();
    const raw=data.content?.map(b=>b.text||'').join('')||'';
    const json=JSON.parse(raw.replace(/```json|```/g,'').trim());
    document.getElementById('outCo').textContent=company;
    document.getElementById('outWrap').style.display='block';
    renderMemo(json,company);
    setStep(4);
    btn.disabled=false; btn.innerHTML='<i class="ti ti-player-play" aria-hidden="true"></i> Generate new memo';
  }catch(e){
    setStep(1);
    document.getElementById('outWrap').style.display='block';
    document.getElementById('memoBody').innerHTML=`<div class="errmsg"><i class="ti ti-alert-circle" aria-hidden="true"></i> Error: ${e.message}. Please try again.</div>`;
    btn.disabled=false; btn.innerHTML='<i class="ti ti-player-play" aria-hidden="true"></i> Generate screening memo';
  }
}

function copy(){
  navigator.clipboard.writeText(document.getElementById('memoBody').innerText).then(()=>{
    const b=document.getElementById('cpBtn'); b.innerHTML='<i class="ti ti-check" aria-hidden="true"></i> Copied';
    setTimeout(()=>{b.innerHTML='<i class="ti ti-copy" aria-hidden="true"></i> Copy';},1800);
  });
}

function reset(){
  ['co','desc'].forEach(id=>document.getElementById(id).value='');
  ['sec','rev','lead'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('outWrap').style.display='none';
  document.getElementById('runBtn').innerHTML='<i class="ti ti-player-play" aria-hidden="true"></i> Generate screening memo';
  document.getElementById('runBtn').disabled=false;
  setStep(1);
}
</script>
